version: "3"

services:

  app:

    build: ./app

    container_name: flask_app

    ports:

      - "5000:5000"

  nginx:

    image: nginx

    container_name: nginx_server

    ports:

      - "80:80"

    volumes:

      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:

      - app